<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuário</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f3f4f6;
            --surface: #ffffff;
            --text: #1f2937;
            --text-light: #6b7280;
            --error: #ef4444;
            --border: #d1d5db;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg);
            padding: 1rem;
        }

        .card {
            background: var(--surface);
            padding: 2rem;
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            margin-bottom: 1.5rem;
            color: var(--text);
            text-align: center;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text);
            font-size: 0.875rem;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            font-size: 1rem;
            transition: border-color 0.2s;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        input.invalid {
            border-color: var(--error);
        }

        .help-text {
            font-size: 0.75rem;
            color: var(--text-light);
            margin-top: 0.25rem;
        }

        .error-message {
            display: none;
            color: var(--error);
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }

        .error-message.visible {
            display: block;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 0.375rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 0.5rem;
        }

        button:hover {
            background-color: var(--primary-hover);
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>Criar Conta</h2>
        <form id="registerForm" novalidate>
            <!-- Nome Completo -->
            <div class="form-group">
                <label for="fullname">Nome Completo</label>
                <input type="text" id="fullname" placeholder="Seu nome">
                <small class="error-message">O nome é obrigatório.</small>
            </div>
            <!-- E-mail -->
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="exemplo@email.com">
                <small class="error-message">Insira um e-mail válido.</small>
            </div>

            <!-- Senha -->
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="••••••••">
                <div class="help-text">A senha deve ter no mínimo 8 caracteres.</div>
                <small class="error-message">A senha deve ter no mínimo 8 caracteres.</small>
            </div>

            <!-- Telefone -->
            <div class="form-group">
                <label for="phone">Telefone <span
                        style="font-weight:normal; color:var(--text-light)">(Opcional)</span></label>
                <input type="tel" id="phone" placeholder="Apenas números">
                <small class="error-message">O telefone deve conter apenas números.</small>
            </div>

            <button type="submit">Cadastrar</button>
        </form>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('registerForm');

            // Elementos
            const nameInput = document.getElementById('fullname');
            const emailInput = document.getElementById('email');
            const passInput = document.getElementById('password');
            const phoneInput = document.getElementById('phone');

            // Regex para validação
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const phoneRegex = /^\d*$/; // Aceita vazio ou apenas dígitos

            const setError = (element, show) => {
                const group = element.parentElement;
                const errorMsg = group.querySelector('.error-message');

                if (show) {
                    element.classList.add('invalid');
                    errorMsg.classList.add('visible');
                } else {
                    element.classList.remove('invalid');
                    errorMsg.classList.remove('visible');
                }
            };

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                let isValid = true;

                // 1. Validação Nome (Obrigatório)
                if (!nameInput.value.trim()) {
                    setError(nameInput, true);
                    isValid = false;
                } else {
                    setError(nameInput, false);
                }

                // 2. Validação E-mail (Obrigatório e Formato)
                if (!emailInput.value.trim() || !emailRegex.test(emailInput.value)) {
                    setError(emailInput, true);
                    isValid = false;
                } else {
                    setError(emailInput, false);
                }

                // 3. Validação Senha (Obrigatório e min 8 chars)
                if (!passInput.value || passInput.value.length < 8) {
                    setError(passInput, true);
                    isValid = false;
                } else {
                    setError(passInput, false);
                }

                // 4. Validação Telefone (Opcional, apenas números)
                // Se tiver valor, verifica se são apenas números
                if (phoneInput.value && !phoneRegex.test(phoneInput.value)) {
                    setError(phoneInput, true);
                    isValid = false;
                } else {
                    setError(phoneInput, false);
                }

                // Resultado
                if (isValid) {
                    // Pequeno delay para a renderização da UI atualizar antes do alert
                    setTimeout(() => alert('Sucesso'), 10);
                }
            });

            // UX Extra: Limpar erro ao digitar
            [nameInput, emailInput, passInput, phoneInput].forEach(input => {
                input.addEventListener('input', () => setError(input, false));
            });
        });
    </script>
</body>

</html>
