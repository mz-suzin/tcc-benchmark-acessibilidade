<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Navbar Benchmark</title>
    <style>
        :root {
            --primary: #2563eb;
            --text: #1f2937;
            --bg: #ffffff;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --nav-height: 70px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f3f4f6;
        }

        .navbar {
            background: var(--bg);
            height: var(--nav-height);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
            box-shadow: var(--shadow);
            position: relative;
            z-index: 1000;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text);
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        /* Dropdown Desktop */
        .dropdown {
            position: relative;
            height: 100%;
            display: flex;
            align-items: center;
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            /* Abaixo do header */
            left: 0;
            background: var(--bg);
            min-width: 180px;
            box-shadow: var(--shadow);
            list-style: none;
            border-radius: 0 0 8px 8px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: all 0.2s ease;
            overflow: hidden;
        }

        .dropdown:hover .dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-menu li a {
            display: block;
            padding: 0.75rem 1.5rem;
        }

        .dropdown-menu li a:hover {
            background-color: #f9fafb;
        }

        /* Hamburger Icon */
        .hamburger {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            flex-direction: column;
            gap: 5px;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background-color: var(--text);
            border-radius: 2px;
            transition: all 0.3s;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .hamburger {
                display: flex;
            }

            .nav-links {
                position: absolute;
                top: var(--nav-height);
                left: 0;
                width: 100%;
                background: var(--bg);
                flex-direction: column;
                align-items: flex-start;
                padding: 1rem 0;
                gap: 0;
                box-shadow: var(--shadow);

                /* Estado inicial oculto */
                max-height: 0;
                overflow: hidden;
                opacity: 0;
                transition: all 0.3s ease-in-out;
            }

            .nav-links.active {
                max-height: 400px;
                /* Altura suficiente para o conteúdo */
                opacity: 1;
            }

            .nav-links>li {
                width: 100%;
                border-bottom: 1px solid #f3f4f6;
            }

            .nav-links>li:last-child {
                border-bottom: none;
            }

            .nav-links a {
                display: block;
                padding: 1rem 2rem;
                width: 100%;
            }

            /* Dropdown Mobile */
            .dropdown {
                flex-direction: column;
                align-items: flex-start;
                height: auto;
            }

            .dropdown-menu {
                position: static;
                /* Flui no documento */
                box-shadow: none;
                opacity: 1;
                visibility: visible;
                transform: none;
                background-color: #f9fafb;
                width: 100%;
                display: none;
                /* Oculto até hover ou click */
            }

            .dropdown:hover .dropdown-menu,
            .dropdown:focus-within .dropdown-menu {
                display: block;
            }

            .dropdown-menu li a {
                padding-left: 3rem;
                /* Indentação */
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <a href="#" class="logo">BenchmarkApp</a>

        <button class="hamburger" aria-label="Abrir menu">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <ul class="nav-links">
            <li><a href="#">Início</a></li>
            <li class="dropdown">
                <a href="#">Serviços ▾</a>
                <ul class="dropdown-menu">
                    <li><a href="#">Consultoria</a></li>
                    <li><a href="#">Desenvolvimento</a></li>
                    <li><a href="#">Design</a></li>
                </ul>
            </li>
            <li><a href="#">Sobre</a></li>
            <li><a href="#">Contato</a></li>
        </ul>
    </nav>

    <script>
        const hamburger = document.querySelector('.hamburger');
        const navLinks = document.querySelector('.nav-links');

        hamburger.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });
    </script>

</body>

</html>
