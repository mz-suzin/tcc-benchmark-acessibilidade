<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu de Navegação Principal</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --text-color: #1f2937;
            --text-hover: #3b82f6;
            --bg-color: #ffffff;
            --bg-hover: #f3f4f6;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f9fafb;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background-color: var(--bg-color);
            box-shadow: var(--shadow);
            position: relative;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .nav-links {
            display: flex;
            list-style: none;
            align-items: center;
            gap: 2rem;
        }

        .nav-item {
            position: relative;
        }

        .nav-link, .dropdown-btn {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-color);
            text-decoration: none;
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0;
            transition: color 0.2s ease;
            font-family: inherit;
        }

        .nav-link:hover, .dropdown-btn:hover, .dropdown-btn.active {
            color: var(--text-hover);
        }

        .caret {
            font-size: 0.75rem;
            transition: transform 0.3s ease;
        }

        .dropdown-btn.active .caret {
            transform: rotate(180deg);
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            margin-top: 0.5rem;
            background-color: var(--bg-color);
            min-width: 200px;
            border-radius: 0.5rem;
            box-shadow: var(--shadow);
            list-style: none;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s ease;
            overflow: hidden;
        }

        .dropdown-menu.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-item {
            display: block;
            padding: 0.75rem 1.25rem;
            color: var(--text-color);
            text-decoration: none;
            font-size: 0.95rem;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .dropdown-item:hover {
            background-color: var(--bg-hover);
            color: var(--primary-color);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="#" class="logo">BrandLogo</a>
        <ul class="nav-links">
            <li class="nav-item"><a href="#" class="nav-link">Início</a></li>
            <li class="nav-item"><a href="#" class="nav-link">Sobre</a></li>
            <li class="nav-item dropdown">
                <button class="dropdown-btn" aria-haspopup="true" aria-expanded="false">
                    Serviços <span class="caret">&#9660;</span>
                </button>
                <ul class="dropdown-menu">
                    <li><a href="#" class="dropdown-item">Consultoria</a></li>
                    <li><a href="#" class="dropdown-item">Desenvolvimento</a></li>
                    <li><a href="#" class="dropdown-item">Design</a></li>
                </ul>
            </li>
            <li class="nav-item"><a href="#" class="nav-link">Contato</a></li>
        </ul>
    </nav>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const dropdownBtn = document.querySelector('.dropdown-btn');
            const dropdownMenu = document.querySelector('.dropdown-menu');

            const toggleDropdown = (e) => {
                e.stopPropagation();
                const isExpanded = dropdownBtn.getAttribute('aria-expanded') === 'true';
                
                dropdownBtn.setAttribute('aria-expanded', !isExpanded);
                dropdownBtn.classList.toggle('active');
                dropdownMenu.classList.toggle('show');
            };

            const closeDropdown = () => {
                dropdownBtn.setAttribute('aria-expanded', 'false');
                dropdownBtn.classList.remove('active');
                dropdownMenu.classList.remove('show');
            };

            dropdownBtn.addEventListener('click', toggleDropdown);

            document.addEventListener('click', (e) => {
                if (!dropdownBtn.contains(e.target) && !dropdownMenu.contains(e.target)) {
                    closeDropdown();
                }
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && dropdownMenu.classList.contains('show')) {
                    closeDropdown();
                    dropdownBtn.focus();
                }
            });
        });
    </script>
</body>
</html>
